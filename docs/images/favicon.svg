  <path d="M33 16 C33 16, 42 16, 45 20 C48 24, 49 27, 48 31 C50 32, 51 35, 50 38 C49 41, 47 43, 45 44 C45 46, 43 48, 40 48 C37 48, 35 47, 33 45"
