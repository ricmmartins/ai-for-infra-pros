<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C5F8A"/>
      <stop offset="100%" style="stop-color:#1B3A5C"/>
    </linearGradient>
    <linearGradient id="circuit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8BB8D9"/>
      <stop offset="100%" style="stop-color:#D6E8F5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Brain left hemisphere -->
  <path d="M31 16 C31 16, 22 16, 19 20 C16 24, 15 27, 16 31 C14 32, 13 35, 14 38 C15 41, 17 43, 19 44 C19 46, 21 48, 24 48 C27 48, 29 47, 31 45" 
