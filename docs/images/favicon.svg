  <!-- Center line -->
  <line x1="32" y1="15" x2="32" y2="46" stroke="#5B8DB8" stroke-width="1.5" opacity="0.5"/>
  <!-- Circuit traces - left -->
  <path d="M22 24 L26 24 L26 28" fill="none" stroke="#8BB8D9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
