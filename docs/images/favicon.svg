  <path d="M22 42 L27 42 L27 38" fill="none" stroke="#8BB8D9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Circuit traces - right -->
  <path d="M42 24 L38 24 L38 28" fill="none" stroke="#8BB8D9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M45 32 L40 32 L40 37" fill="none" stroke="#8BB8D9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M42 42 L37 42 L37 38" fill="none" stroke="#8BB8D9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Circuit nodes -->
  <circle cx="22" cy="24" r="2" fill="#D6E8F5"/>
  <circle cx="26" cy="28" r="2" fill="#D6E8F5"/>
  <circle cx="19" cy="32" r="2" fill="#D6E8F5"/>
  <circle cx="24" cy="37" r="2" fill="#D6E8F5"/>
  <circle cx="22" cy="42" r="2" fill="#D6E8F5"/>
