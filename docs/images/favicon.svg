  <circle cx="42" cy="24" r="2" fill="#D6E8F5"/>
  <circle cx="38" cy="28" r="2" fill="#D6E8F5"/>
  <circle cx="45" cy="32" r="2" fill="#D6E8F5"/>
  <circle cx="40" cy="37" r="2" fill="#D6E8F5"/>
  <circle cx="42" cy="42" r="2" fill="#D6E8F5"/>
  <circle cx="37" cy="38" r="2" fill="#D6E8F5"/>
  <!-- Central core node -->
  <circle cx="32" cy="30" r="3.5" fill="#5B8DB8" stroke="#D6E8F5" stroke-width="1.5"/>
  <circle cx="32" cy="30" r="1.5" fill="#D6E8F5"/>
