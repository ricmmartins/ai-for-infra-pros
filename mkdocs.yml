site_name: AI for Infra Pros
site_url: https://www.ai4infra.com
site_description: The Practical Handbook for Infrastructure Engineers Entering the AI Era
site_author: Ricardo Martins

repo_url: https://github.com/ricmmartins/ai-for-infra-pros
repo_name: ricmmartins/ai-for-infra-pros

copyright: >
  Created by <a href="https://rmmartins.com">Ricardo Martins</a> —
  Principal Solutions Engineer @ Microsoft

theme:
  name: material
  language: en
  logo: images/favicon.svg
  favicon: images/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

nav:
  - Home: index.md
  - Free Chapters:
    - "Ch 1: Why AI Needs You ✦": chapters/01-introduction.md
    - "Ch 4: The GPU Deep Dive ✦": chapters/04-gpu-deep-dive.md
    - "Ch 15: Visual Glossary ✦": chapters/15-visual-glossary.md
  - Part I — Foundations:
    - "Ch 2: Data — The Fuel That Powers Everything": previews/02-data.md
    - "Ch 3: Compute — Where Intelligence Comes to Life": previews/03-compute.md
  - Part II — Building:
    - "Ch 5: Infrastructure as Code for AI": previews/05-iac.md
    - "Ch 6: MLOps from an Infra Lens": previews/06-mlops.md
  - Part III — Operating:
    - "Ch 7: Monitoring and Observability": previews/07-monitoring.md
    - "Ch 8: Security in AI Environments": previews/08-security.md
    - "Ch 9: Cost Engineering": previews/09-cost-engineering.md
  - Part IV — Scaling:
    - "Ch 10: Platform Operations at Scale": previews/10-platform-ops.md
    - "Ch 11: Azure OpenAI — Tokens & Throughput": previews/11-azure-openai.md
    - "Ch 12: Troubleshooting Playbook": previews/12-troubleshooting.md
  - Part V — Strategy:
    - "Ch 13: AI Use Cases for Infra Engineers": previews/13-ai-use-cases.md
    - "Ch 14: The AI Adoption Framework": previews/14-adoption-framework.md
  - Hands-On Labs:
    - extras/labs/index.md
    - "Lab 1: GPU VM with Bicep ✦": extras/labs/bicep-vm-gpu/index.md
    - "Lab 2: AKS GPU with Terraform ✦": extras/labs/terraform-aks-gpu/index.md
    - "Lab 3: Inference API with Azure ML ✦": extras/labs/yaml-inference-api/index.md
  - Extras:
    - Case Studies: previews/case-studies.md
    - Cheatsheets: previews/cheatsheets.md
    - Technical FAQ: previews/technical-faq.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-\.]+'
  - minify:
      minify_html: true

extra:
  book_url: https://leanpub.com/ai-for-infra-pros
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ricmmartins
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/ricmmartins
    - icon: fontawesome/solid/globe
      link: https://rmmartins.com

extra_css:
  - stylesheets/extra.css
